name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, release]

jobs:
  build:
    name: Build & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore src/DotTop/DotTop.csproj
      - name: Build
        run: dotnet build src/DotTop/DotTop.csproj -c Release --no-restore
      - name: Cross-publish linux-x64 (sanity)
        run: |
          dotnet publish src/DotTop/DotTop.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishTrimmed=true -p:TrimMode=partial \
            -o publish/linux-x64
          file publish/linux-x64/dottop
          ls -lh publish/linux-x64/dottop
